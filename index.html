  <style>
    .custom-marker { background: none; border: none; }
    .marker-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3), 0 0 8px rgba(0,0,0,0.1);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .marker-dot:hover {
      transform: scale(1.4);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 12px rgba(0,0,0,0.15);
    }
    .marker-cluster-custom { background: none; }
    .cluster-icon {
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; color: #fff; font-weight: 700;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      border: 2px solid rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
    }
    .cluster-icon--small { background: rgba(59,130,246,0.8); width: 30px; height: 30px; }
    .cluster-icon--medium { background: rgba(249,115,22,0.8); width: 38px; height: 38px; font-size: 12px; }
    .cluster-icon--large { background: rgba(239,68,68,0.8); width: 48px; height: 48px; font-size: 13px; }
    .cw-popup .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      font-family: 'DM Sans', sans-serif;
      padding: 2px;
      border: 1px solid var(--border-light);
    }
    .cw-popup .leaflet-popup-tip { box-shadow: none; border: 1px solid var(--border-light); }
    [data-theme="dark"] .cw-popup .leaflet-popup-content-wrapper {
      background: #1E1F24; color: #EAEBED;
      border-color: #2A2B31;
    }
    [data-theme="dark"] .cw-popup .leaflet-popup-tip { background: #1E1F24; border-color: #2A2B31; }
    /* Keep Leaflet attribution inside the map, not overlapping sidebar */
    .leaflet-control-attribution {
      font-size: 10px;
      background: rgba(255,255,255,0.7) !important;
      padding: 2px 6px !important;
      border-radius: 4px 0 0 0;
    }
    [data-theme="dark"] .leaflet-control-attribution {
      background: rgba(26,27,30,0.8) !important;
      color: #6B6D76 !important;
    }
    [data-theme="dark"] .leaflet-control-attribution a { color: #8E909A !important; }
  </style>

<body>

  <div class="app">
    <!-- Status Banner -->
    <div class="status-banner" id="status-banner" role="alert"></div>

    <!-- Header Ad (hidden until loaded) -->
    <div class="ad-slot ad-slot--header" id="ad-header" aria-label="Advertisement"></div>

    <!-- Header -->
    <header class="header">
      <div class="header__logo">
        <div class="header__logo-icon">🌍</div>
        <div>
          <h1 class="header__title" data-i18n="siteTitle">ConflictWatch</h1>
          <span class="header__subtitle" data-i18n="siteSubtitle">Real-time global conflict tracker</span>
        </div>
      </div>

      <div class="header__actions">
        <div class="last-updated">
          <span class="last-updated__dot"></span>
          <span id="last-updated">Loading...</span>
        </div>
        <div class="lang-switcher" id="lang-switcher">
          <button class="btn btn--ghost btn--sm lang-switcher__btn" id="lang-btn" aria-label="Language" title="Language">🌐</button>
          <div class="lang-switcher__dropdown" id="lang-dropdown"></div>
        </div>
        <button class="btn btn--ghost btn--sm" id="filter-toggle" aria-expanded="false" aria-controls="filter-panel">
          <span data-i18n="filters">Filters</span> <span class="filter-count" id="filter-count">0</span>
        </button>
        <button class="btn btn--ghost btn--sm share-btn" id="share-btn" data-i18n-aria="share" aria-label="Share this page" title="Share">🔗</button>
        <button class="theme-toggle" id="theme-toggle" data-i18n-aria="toggleDark" aria-label="Toggle dark mode">🌙</button>
        <button class="hamburger" id="hamburger" data-i18n-aria="toggleMenu" aria-label="Toggle menu">
          <span class="hamburger__line"></span>
          <span class="hamburger__line"></span>
          <span class="hamburger__line"></span>
        </button>
      </div>
    </header>

    <!-- Main -->
    <main class="main" id="main-content">
      <div class="map-container">
        <div id="map" role="application" aria-label="Conflict events map"></div>
        <div class="map-stats" id="map-stats">
          <div class="map-stat"><span class="map-stat__value" id="stat-total">—</span> <span data-i18n="events">events</span></div>
          <div class="map-stat"><span class="map-stat__value" id="stat-countries">—</span> <span data-i18n="countries">countries</span></div>
          <div class="map-stat" id="stat-fatalities-wrap" style="display:none"><span class="map-stat__value" id="stat-fatalities">—</span> <span data-i18n="fatalities">fatalities</span></div>
        </div>
      </div>

      <aside class="sidebar" aria-label="Event list">
        <div class="sidebar__drag-handle"></div>

        <div class="sidebar__header">
          <span class="sidebar__title" id="event-count" data-i18n="loadingEvents">Loading events...</span>
          <button class="btn btn--icon btn--ghost" id="sidebar-close" data-i18n-aria="closeSidebar" aria-label="Close sidebar">✕</button>
        </div>

        <div class="filter-panel" id="filter-panel" role="region" aria-label="Filters"></div>

        <div class="sidebar__search">
          <div class="sidebar__search-wrap">
            <span class="sidebar__search-icon">🔍</span>
            <input type="search" id="sidebar-search" data-i18n="searchPlaceholder" placeholder="Search country, event type..." aria-label="Search events">
          </div>
        </div>

        <div class="sidebar__events" id="events-list" role="list" aria-live="polite"></div>

        <div style="padding:8px 18px;text-align:center">
          <button class="btn btn--ghost" id="load-more" style="display:none;width:100%" data-i18n="loadMore">Load More</button>
        </div>

        <!-- Sidebar Ad (desktop only) -->
        <div class="ad-slot ad-slot--sidebar" id="ad-sidebar" aria-label="Advertisement"></div>
      </aside>
    </main>

    <!-- Timeline -->
    <section class="timeline-container" id="timeline" role="navigation" aria-label="Event timeline"></section>

    <!-- Footer -->
    <footer class="footer">
      <span><span data-i18n="copyright">ConflictWatch Live</span> &copy; <span id="copyright-year">2026</span> &middot; <span data-i18n="data">Data</span>: <a href="https://acleddata.com" target="_blank" rel="noopener noreferrer">ACLED</a></span>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <a href="/pages/about.html" data-i18n="about">About</a>
        <a href="/pages/how-to-use.html" data-i18n="howToUse">How to Use</a>
        <a href="/pages/privacy.html" data-i18n="privacy">Privacy</a>
        <a href="/pages/terms.html" data-i18n="terms">Terms</a>
        <a href="#" id="footer-feedback-link" data-i18n="feedback">Feedback</a>
      </div>
      <span class="visitor-counter" id="visitor-counter"></span>
    </footer>

    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle event list">📋</button>
    <button class="feedback-fab" id="feedback-fab" aria-label="Send feedback" title="Send us feedback" data-i18n-aria="feedback" data-i18n-title="feedback">💬</button>
    <div class="ad-slot ad-slot--mobile-footer" id="ad-mobile-footer" aria-label="Advertisement"></div>
